<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InzurAI+ · Seguros en Movimiento</title>
    
</head>
<body>


    <!-- DASHBOARD -->
    <div class="main-dashboard" id="dashboardMain">
        <div class="top-navbar">
            <div class="action-buttons">
                <div class="btn-action plus" onclick="crearNuevoUsuario()">+</div>
                <div class="btn-action lupa" onclick="buscarUsuarios()">
    <i class="bi bi-search"></i>
</div>
            </div>
            
           <div class="nav-item active" id="navDashboard" onclick="cambiarSeccion('dashboard')">
    <i class="bi bi-grid-1x2-fill"></i>
    <span>dashboard</span>
</div>

<div class="nav-item" id="navPersonas" onclick="cambiarSeccion('personas')">
    <i class="bi bi-people-fill"></i>
    <span>personas</span>
</div>

<div class="nav-item" id="navPerfiles" onclick="cambiarSeccion('perfiles')">
    <i class="bi bi-person-vcard-fill"></i>
    <span>perfiles</span>
</div>

<div class="nav-item" id="navConfiguracion" onclick="cambiarSeccion('configuracion')">
    <i class="bi bi-gear-fill"></i>
    <span>configuración</span>
</div>
            
            <div class="user-section">
                <span class="user-name" id="userDisplay">Admin</span>
                <div class="user-avatar">A</div>
            </div>
        </div>

        <div class="main-content">
            <div class="page-header">
                <h1 id="pageTitle">Buscar personas</h1>
                <div class="filter-text" id="filterIndicator">
                    <span>Filtro</span> | Todos los registros
                </div>
            </div>

            <!-- Search section -->
            <div class="search-section" id="searchSection">
                <div class="search-title" onclick="toggleFilters()">
                    Opciones de búsqueda:
                    <span class="arrow" id="searchArrow">▼</span>
                </div>
                
                <div class="filters-container" id="filtersContainer">
                    <div class="filters-grid">
                        <div class="filter-item">
                            <label>Persona</label>
                            <input type="text" id="filterPerson" placeholder="Cualquier..." onkeyup="aplicarFiltros()">
                        </div>
                        <div class="filter-item">
                            <label>Email</label>
                            <input type="text" id="filterEmail" placeholder="Cualquier..." onkeyup="aplicarFiltros()">
                        </div>
                        <div class="filter-item">
                            <label>Organización</label>
                            <select id="filterOrganization" onchange="aplicarFiltros()">
                                <option value="">Cualquier</option>
                                <option value="Démó">Démó</option>
                                <option value="IT Department">IT Department</option>
                                <option value="Corretaje Central">Corretaje Central</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <div class="total-objects" id="totalObjects">Total: 7 personas</div>
            </div>

            <!-- Tabla con botón + sin fondo -->
            <div class="table-container" id="tableContainer">
                <!-- Botón + sin círculo -->
                <div class="table-plus-button" onclick="crearNuevoUsuario()">+</div>
                
                <table class="crud-table" id="personasTable">
                    <thead>
                        <tr>
                            <th>Persona</th>
                            <th>Apellido</th>
                            <th>Organización</th>
                            <th>Email</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>

                <div class="pagination-container">
                    <div class="pagination-buttons">
                        <button class="btn-pagination" onclick="paginaAnterior()" id="btnPrev" disabled>Anterior</button>
                        <button class="btn-pagination" onclick="paginaSiguiente()" id="btnNext">Siguiente</button>
                    </div>
                    <div class="per-page">
                        <span id="pageInfo">Página 1 de 2</span>
                        <span class="items-total" id="totalItems">7 items</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    

           
    </div>

    <script>
        let personas = [
            { id: 1, nombre: 'Agathe', apellido: 'Chiriac', organizacion: 'Démó', estado: 'ACTIVO', email: 'agathe.chiriac@demo.com' },
            { id: 2, nombre: 'Anna', apellido: 'Gavaldà', organizacion: 'IT Department', estado: 'ACTIVO', email: 'annav@gavalda.it.com' },
            { id: 3, nombre: 'Bence', apellido: 'Varga', organizacion: 'Démó', estado: 'CREADO', email: 'varga.bencev@gmail.com' },
            { id: 4, nombre: 'Borca', apellido: 'Sáez', organizacion: 'IT Department', estado: 'ACTIVO', email: 'borca.saez@unipd.it' },
            { id: 5, nombre: 'Charles', apellido: 'Armour', organizacion: 'IT Department', estado: 'ACTIVO', email: 'charles.armour@it.com' },
            { id: 6, nombre: 'Charles', apellido: 'Patton', organizacion: 'IT Department', estado: 'INACTIVO', email: 'charles.patton@it.com' },
            { id: 7, nombre: 'Claude', apellido: 'Monnet', organizacion: 'Démó', estado: 'ACTIVO', email: 'claude.monnet@democons' }
        ];

        let personasFiltradas = [...personas];
        let personaEditandoId = null;
        let paginaActual = 1;
        const itemsPorPagina = 5;

        const onboardingScreen = document.getElementById('onboardingScreen');
        const dashboardMain = document.getElementById('dashboardMain');
        const btnIngresar = document.getElementById('btnIngresarOnboarding');
        const modal = document.getElementById('modalPersona');
        const tableBody = document.getElementById('tableBody');
        const totalObjects = document.getElementById('totalObjects');
        const userDisplay = document.getElementById('userDisplay');
        const pageTitle = document.getElementById('pageTitle');
        const filterIndicator = document.getElementById('filterIndicator');
        const searchSection = document.getElementById('searchSection');
        const tableContainer = document.getElementById('tableContainer');
        const btnPrev = document.getElementById('btnPrev');
        const btnNext = document.getElementById('btnNext');
        const pageInfo = document.getElementById('pageInfo');
        const totalItems = document.getElementById('totalItems');
        const filterPerson = document.getElementById('filterPerson');
        const filterEmail = document.getElementById('filterEmail');
        
        const navDashboard = document.getElementById('navDashboard');
        const navPersonas = document.getElementById('navPersonas');
        const navPerfiles = document.getElementById('navPerfiles');
        const navConfiguracion = document.getElementById('navConfiguracion');

        function cambiarSeccion(seccion) {
            navDashboard.classList.remove('active');
            navPersonas.classList.remove('active');
            navPerfiles.classList.remove('active');
            navConfiguracion.classList.remove('active');
            
            if (seccion === 'dashboard') {
                navDashboard.classList.add('active');
                pageTitle.textContent = 'Buscar personas';
                filterIndicator.style.display = 'flex';
                searchSection.style.display = 'block';
                tableContainer.style.display = 'block';
            } else if (seccion === 'personas') {
                navPersonas.classList.add('active');
                pageTitle.textContent = 'Gestión de Personas';
                filterIndicator.style.display = 'none';
                searchSection.style.display = 'none';
                tableContainer.style.display = 'block';
            } else if (seccion === 'perfiles') {
                navPerfiles.classList.add('active');
                pageTitle.textContent = 'Administración de Perfiles';
                filterIndicator.style.display = 'none';
                searchSection.style.display = 'none';
                tableContainer.style.display = 'block';
            } else if (seccion === 'configuracion') {
                navConfiguracion.classList.add('active');
                pageTitle.textContent = 'Configuración del Sistema';
                filterIndicator.style.display = 'none';
                searchSection.style.display = 'none';
                tableContainer.style.display = 'block';
            }
        }

        function toggleFilters() {
            const container = document.getElementById('filtersContainer');
            const arrow = document.getElementById('searchArrow');
            container.classList.toggle('collapsed');
            arrow.classList.toggle('rotated');
        }

        function crearNuevoUsuario() {
            personaEditandoId = null;
            document.getElementById('modalTitle').textContent = 'Create Molkobain Ticket';
            document.getElementById('displayNombre').textContent = 'Create Molkobain Ticket';
            
            // Limpiar campos ocultos
            document.getElementById('editNombre').value = '';
            document.getElementById('editApellido').value = '';
            document.getElementById('editEmail').value = '';
            document.getElementById('editOrganizacion').value = 'Démó';
            document.getElementById('editEstado').value = 'CREADO';
            
            modal.classList.add('show');
        }

        function buscarUsuarios() {
            cambiarSeccion('dashboard');
            const container = document.getElementById('filtersContainer');
            const arrow = document.getElementById('searchArrow');
            if (container.classList.contains('collapsed')) {
                container.classList.remove('collapsed');
                arrow.classList.remove('rotated');
            }
            setTimeout(() => filterPerson.focus(), 100);
        }

        function cambiarEstado(id, nuevoEstado) {
            const persona = personas.find(p => p.id === id);
            if (persona) {
                persona.estado = nuevoEstado;
                aplicarFiltros();
            }
        }

        function renderizarTabla() {
            const inicio = (paginaActual - 1) * itemsPorPagina;
            const fin = inicio + itemsPorPagina;
            const personasPaginadas = personasFiltradas.slice(inicio, fin);
            
            tableBody.innerHTML = '';
            personasPaginadas.forEach(persona => {
                const estadoClass = persona.estado === 'CREADO' ? 'creado' : 
                                   persona.estado === 'ACTIVO' ? 'activo' : 'inactivo';
                
                const row = document.createElement('tr');
                row.onclick = () => editarPersona(persona.id);
                row.innerHTML = `
                    <td><span class="person-name">${persona.nombre} ${persona.apellido}</span></td>
                    <td>${persona.apellido}</td>
                    <td><span class="organization-name">${persona.organizacion}</span></td>
                    <td><span class="email-address">${persona.email}</span></td>
                    <td>
                        <div class="status-container">
                            <span class="status-dot ${estadoClass}"></span>
                            <select class="status-select-clean ${estadoClass}" onchange="cambiarEstado(${persona.id}, this.value)" onclick="event.stopPropagation()">
                                <option value="CREADO" ${persona.estado === 'CREADO' ? 'selected' : ''}>CREADO</option>
                                <option value="ACTIVO" ${persona.estado === 'ACTIVO' ? 'selected' : ''}>ACTIVO</option>
                                <option value="INACTIVO" ${persona.estado === 'INACTIVO' ? 'selected' : ''}>INACTIVO</option>
                            </select>
                        </div>
                    </td>
                `;
                tableBody.appendChild(row);
            });

            totalObjects.textContent = `Total: ${personasFiltradas.length} personas`;
            totalItems.textContent = `${personasFiltradas.length} items`;
            
            const totalPaginas = Math.ceil(personasFiltradas.length / itemsPorPagina);
            pageInfo.textContent = `Página ${paginaActual} de ${totalPaginas || 1}`;
            
            btnPrev.disabled = paginaActual === 1;
            btnNext.disabled = paginaActual === totalPaginas || totalPaginas === 0;
        }

        function aplicarFiltros() {
            const filterPerson = document.getElementById('filterPerson').value.toLowerCase();
            const filterEmail = document.getElementById('filterEmail').value.toLowerCase();
            const filterOrg = document.getElementById('filterOrganization').value;

            personasFiltradas = personas.filter(persona => {
                const nombreCompleto = `${persona.nombre} ${persona.apellido}`.toLowerCase();
                const cumplePersona = !filterPerson || nombreCompleto.includes(filterPerson);
                const cumpleEmail = !filterEmail || persona.email.toLowerCase().includes(filterEmail);
                const cumpleOrg = !filterOrg || persona.organizacion === filterOrg;
                
                return cumplePersona && cumpleEmail && cumpleOrg;
            });

            paginaActual = 1;
            renderizarTabla();
        }

        function paginaAnterior() {
            if (paginaActual > 1) {
                paginaActual--;
                renderizarTabla();
            }
        }

        function paginaSiguiente() {
            const totalPaginas = Math.ceil(personasFiltradas.length / itemsPorPagina);
            if (paginaActual < totalPaginas) {
                paginaActual++;
                renderizarTabla();
            }
        }

        function editarPersona(id) {
            const persona = personas.find(p => p.id === id);
            if (persona) {
                personaEditandoId = id;
                document.getElementById('modalTitle').textContent = 'Edit Molkobain Ticket';
                document.getElementById('displayNombre').textContent = `Edit: ${persona.nombre} ${persona.apellido}`;
                
                // Actualizar campos ocultos
                document.getElementById('editNombre').value = persona.nombre;
                document.getElementById('editApellido').value = persona.apellido;
                document.getElementById('editEmail').value = persona.email;
                document.getElementById('editOrganizacion').value = persona.organizacion;
                document.getElementById('editEstado').value = persona.estado;
                
                modal.classList.add('show');
            }
        }

        function guardarPersona() {
            const nombre = document.getElementById('editNombre').value.trim();
            const apellido = document.getElementById('editApellido').value.trim();
            const email = document.getElementById('editEmail').value.trim();
            const organizacion = document.getElementById('editOrganizacion').value;
            const estado = document.getElementById('editEstado').value;

            if (!nombre || !apellido || !email) {
                alert('Por favor complete los campos obligatorios');
                return;
            }

            if (personaEditandoId) {
                const index = personas.findIndex(p => p.id === personaEditandoId);
                if (index !== -1) {
                    personas[index] = {
                        ...personas[index],
                        nombre,
                        apellido,
                        email,
                        organizacion,
                        estado
                    };
                }
            } else {
                const nuevoId = personas.length + 1;
                personas.push({
                    id: nuevoId,
                    nombre,
                    apellido,
                    organizacion,
                    estado,
                    email
                });
            }

            aplicarFiltros();
            cerrarModal();
        }

        function cerrarModal() {
            modal.classList.remove('show');
            personaEditandoId = null;
        }

        btnIngresar.addEventListener('click', function(e) {
            e.preventDefault();
            const usuario = document.getElementById('usuario').value;
            const password = document.getElementById('password').value;
            
            if (usuario && password) {
                onboardingScreen.style.display = 'none';
                dashboardMain.style.display = 'block';
                userDisplay.textContent = 'Admin';
            } else {
                alert('Por favor ingrese usuario y contraseña');
            }
        });

        renderizarTabla();

        window.toggleFilters = toggleFilters;
        window.crearNuevoUsuario = crearNuevoUsuario;
        window.buscarUsuarios = buscarUsuarios;
        window.editarPersona = editarPersona;
        window.cerrarModal = cerrarModal;
        window.guardarPersona = guardarPersona;
        window.aplicarFiltros = aplicarFiltros;
        window.paginaAnterior = paginaAnterior;
        window.paginaSiguiente = paginaSiguiente;
        window.cambiarEstado = cambiarEstado;
        window.cambiarSeccion = cambiarSeccion;
    </script>
</body>
</html>
